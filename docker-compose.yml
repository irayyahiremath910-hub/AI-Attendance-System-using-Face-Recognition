version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: attendance_db
    environment:
      POSTGRES_DB: ${DB_NAME:-attendance_db}
      POSTGRES_USER: ${DB_USER:-attendance_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-attendance_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendance_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendance_network

  # Django Web Application
  web:
    build: .
    container_name: attendance_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 Project101.wsgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://${DB_USER:-attendance_user}:${DB_PASSWORD:-secure_password}@db:5432/${DB_NAME:-attendance_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - attendance_network

  # Celery Worker
  celery:
    build: .
    container_name: attendance_celery
    command: celery -A Project101 worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://${DB_USER:-attendance_user}:${DB_PASSWORD:-secure_password}@db:5432/${DB_NAME:-attendance_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me}
    depends_on:
      - db
      - redis
    networks:
      - attendance_network

  # Celery Beat (Scheduler)
  celery-beat:
    build: .
    container_name: attendance_celery_beat
    command: celery -A Project101 beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://${DB_USER:-attendance_user}:${DB_PASSWORD:-secure_password}@db:5432/${DB_NAME:-attendance_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me}
    depends_on:
      - db
      - redis
    networks:
      - attendance_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: attendance_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - attendance_network

  # Optional: Flower for Celery Monitoring
  flower:
    build: .
    container_name: attendance_flower
    command: celery -A Project101 flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://${DB_USER:-attendance_user}:${DB_PASSWORD:-secure_password}@db:5432/${DB_NAME:-attendance_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me}
    depends_on:
      - celery
      - redis
    networks:
      - attendance_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  attendance_network:
    driver: bridge
